<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Predict Serie A</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Predict Serie A</h1>
        <p>
          Strategia a sistema “paracadute” basata su dati pubblici e stima AI.
        </p>
      </header>

      <section class="card warning">
        <strong>Avviso:</strong> nessuna strategia garantisce vincita certa.
      </section>

      <section class="card controls">
        <h2>Parametri</h2>
        <div class="grid">
          <label>
            Budget totale (€)
            <input id="bankroll" type="number" min="10" step="10" value="100" />
          </label>
          <label>
            Massimo partite
            <input id="maxMatches" type="number" min="2" max="10" value="5" />
          </label>
          <label>
            Soglia rischio (0-1)
            <input id="risk" type="number" min="0.05" max="0.95" step="0.05" value="0.45" />
          </label>
        </div>
        <div class="actions">
          <button id="loadMatchesBtn">Carica partite</button>
          <button id="generateBtn">Genera sistema</button>
        </div>
      </section>

      <section class="card">
        <h2>Partite estratte</h2>
        <div id="matches" class="list"></div>
      </section>

      <section class="card">
        <h2>Sistema consigliato</h2>
        <div id="summary"></div>
        <div id="tickets" class="list"></div>
        <div id="notes"></div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
