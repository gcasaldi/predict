<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Predict Serie A</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Predict Serie A</h1>
        <p>
          Strategia a sistema “paracadute” basata su dati pubblici e stima AI.
        </p>
      </header>

      <section class="card warning">
        <strong>Avviso:</strong> nessuna strategia garantisce vincita certa.
      </section>

      <section class="card controls">
        <h2>Parametri</h2>
        <p>Filtro temporale attivo: solo partite future nei prossimi 7 giorni.</p>
        <div class="grid">
          <label>
            Budget totale (€)
            <input id="bankroll" type="number" min="10" step="10" value="100" />
          </label>
          <label>
            Massimo partite
            <input id="maxMatches" type="number" min="2" max="10" value="5" />
          </label>
          <label>
            Profilo rischio
            <input id="risk" type="range" min="5" max="95" step="5" value="45" />
            <small id="riskLabel">45% · Bilanciato</small>
          </label>
        </div>
        <div class="actions">
          <button id="loadMatchesBtn">Carica partite</button>
          <button id="generateBtn">Genera sistema</button>
        </div>
      </section>

      <section class="card">
        <h2>Partite estratte</h2>
        <p id="matchesMeta"></p>
        <div id="matches" class="list"></div>
      </section>

      <section class="card">
        <h2>Sistema consigliato</h2>
        <div id="summary"></div>
        <div id="strategy"></div>
        <div id="tickets" class="list"></div>
        <div id="notes"></div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
